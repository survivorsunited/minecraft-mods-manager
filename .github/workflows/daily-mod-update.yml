name: Daily Mod Update and Release Pipeline

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force create all enabled versions and publish as the latest release'
        required: false
        type: boolean
        default: false
      versions:
        description: 'Comma-separated versions to process (override config, e.g., 1.21.11)'
        required: false
        type: string
        default: ''

permissions:
  contents: write
  actions: read

concurrency:
  group: daily-mod-update-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-database:
    runs-on: windows-latest
    outputs:
      has_updates: ${{ steps.check_updates.outputs.has_updates }}
      versions_matrix: ${{ steps.set_matrix.outputs.matrix }}
      next_game_version: ${{ steps.get_next_latest_versions.outputs.next_game_version }}
      latest_game_version: ${{ steps.get_next_latest_versions.outputs.latest_game_version }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 2

      - name: Sync latest Minecraft version (server, launcher, installer)
        shell: pwsh
        run: |
          Write-Host "🔄 Ensuring latest MC version has server, launcher, installer in DB..." -ForegroundColor Cyan
          .\ModManager.ps1 -SyncLatestMinecraftVersion

      - name: Validate Mod Versions
        shell: pwsh
        run: |
          Write-Host "🔍 Checking for mod updates..." -ForegroundColor Cyan
          .\ModManager.ps1 -ValidateAllModVersions -UpdateModList

      - name: Refresh Next version data only
        shell: pwsh
        run: |
          Write-Host "🔄 Refreshing Next version fields from APIs (Current/Latest unchanged)..." -ForegroundColor Cyan
          .\ModManager.ps1 -ValidateAllModVersions -UpdateNextOnly

      - name: Refresh Latest version data only
        shell: pwsh
        run: |
          Write-Host "🔄 Refreshing Latest version fields from APIs (Current/Next unchanged)..." -ForegroundColor Cyan
          .\ModManager.ps1 -ValidateAllModVersions -UpdateLatestOnly

      - name: Get Next and Latest game versions
        id: get_next_latest_versions
        shell: pwsh
        run: |
          . .\src\Data\Version\Get-NextVersion.ps1
          . .\src\Data\Version\Get-LatestVersion.ps1
          $next = Get-NextVersion -CsvPath modlist.csv
          $latest = Get-LatestVersion -CsvPath modlist.csv
          if ($next) { echo "next_game_version=$next" >> $env:GITHUB_OUTPUT } else { echo "next_game_version=" >> $env:GITHUB_OUTPUT }
          if ($latest) { echo "latest_game_version=$latest" >> $env:GITHUB_OUTPUT } else { echo "latest_game_version=" >> $env:GITHUB_OUTPUT }
          Write-Host "Next game version: $next | Latest game version: $latest" -ForegroundColor Gray

      - name: Scan Database for Misclassified ZIP Mods
        shell: pwsh
        run: |
          $db = Import-Csv modlist.csv
          $zipMods = $db | Where-Object { $_.Type -eq 'mod' -and (([string]::IsNullOrWhiteSpace($_.Jar) -eq $false -and $_.Jar.ToLower().EndsWith('.zip')) -or ($_.CurrentVersionUrl -match '\.zip$') -or ($_.LatestVersionUrl -match '\.zip$') -or ($_.NextVersionUrl -match '\.zip$')) }
          if ($zipMods -and $zipMods.Count -gt 0) {
            Write-Host "⚠️  Found mods with ZIP artifacts (likely misclassification or filename resolution issue):" -ForegroundColor Yellow
            foreach ($m in $zipMods) {
              $id = if ($m.ID) { $m.ID } else { $m.Name }
              $jar = if ($m.Jar) { $m.Jar } else { '(none)' }
              echo "::warning title=ZIP artifact under mod type::$($m.Name) [ID: $id] -> Jar: $jar"
            }
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### ZIP Artifacts Detected in Database (Type=mod)"
            $zipMods | ForEach-Object { Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- $($_.Name) (ID: $($_.ID)) Jar: $($_.Jar)" }
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ""
          } else {
            Write-Host "✅ No misclassified ZIP mods found in database" -ForegroundColor Green
          }

      - name: Check for Database Changes
        id: check_updates
        shell: pwsh
        run: |
          git diff --quiet modlist.csv
          if ($LASTEXITCODE -ne 0) {
            Write-Host "📦 Mod updates detected in database" -ForegroundColor Green
            Write-Host "📊 Changes summary:" -ForegroundColor Cyan
            git diff --stat modlist.csv
            echo "has_updates=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "✅ No mod updates found" -ForegroundColor Gray
            echo "has_updates=false" >> $env:GITHUB_OUTPUT
          }

      - name: Read Enabled Versions from Config
        id: set_matrix
        shell: pwsh
        run: |
          $override = "${{ github.event.inputs.versions }}"

          if ([string]::IsNullOrWhiteSpace($override)) {
            $config = Get-Content release-config.json | ConvertFrom-Json
            $versions = $config.versions | Where-Object { $_.enabled -eq $true } | Select-Object -ExpandProperty version
            Write-Host "ℹ️  No versions override provided; using enabled versions from release-config.json" -ForegroundColor Yellow
          } else {
            $versions = $override.Split(',') | ForEach-Object { $_.Trim() } | Where-Object { $_ }
            Write-Host "🔧 Using manual version override from dispatch input: $override" -ForegroundColor Cyan
          }

          if ($versions.Count -eq 1) {
            $matrixJson = "[$($versions | ConvertTo-Json -Compress)]"
          } else {
            $matrixJson = $versions | ConvertTo-Json -Compress
          }

          echo "matrix=$matrixJson" >> $env:GITHUB_OUTPUT

          Write-Host "📋 Versions selected for release:" -ForegroundColor Cyan
          $versions | ForEach-Object { Write-Host "   - $_" -ForegroundColor Gray }
          Write-Host "📊 Matrix JSON: $matrixJson" -ForegroundColor Gray

      - name: Log No Updates
        if: steps.check_updates.outputs.has_updates != 'true'
        shell: pwsh
        run: |
          Write-Host "" -ForegroundColor White
          Write-Host "ℹ️  ============================================" -ForegroundColor Cyan
          Write-Host "ℹ️  NO MOD UPDATES DETECTED" -ForegroundColor Cyan
          Write-Host "ℹ️  ============================================" -ForegroundColor Cyan
          Write-Host "" -ForegroundColor White
          Write-Host "📋 Workflow will skip without manual force:" -ForegroundColor Yellow
          Write-Host "   • Commit Database Updates (no changes to commit)" -ForegroundColor Gray
          Write-Host "   • Create Release Packages (unless force_all=true)" -ForegroundColor Gray
          Write-Host "   • Publish Release (unless force_all=true)" -ForegroundColor Gray
          Write-Host "" -ForegroundColor White

      - name: Set release decision summary
        id: release_decision
        shell: pwsh
        run: |
          $hasUpdates = "${{ steps.check_updates.outputs.has_updates }}"
          $forceAll = "${{ github.event.inputs.force_all }}"
          $willCreateReleases = ($hasUpdates -eq 'true') -or ($forceAll -eq 'true')
          if ($willCreateReleases) {
            if ($forceAll -eq 'true') {
              $reason = "Manual force_all=true; release packages will be built and published as the latest GitHub Release"
            } else {
              $reason = "Database changed; release packages will be built as an automated pre-release"
            }
          } else {
            $reason = "No modlist.csv changes (has_updates=false) and force_all not set; Create Release Packages and Publish Release will be skipped."
          }
          echo "has_updates=$hasUpdates" >> $env:GITHUB_OUTPUT
          echo "will_create_releases=$willCreateReleases" >> $env:GITHUB_OUTPUT
          echo "reason=$reason" >> $env:GITHUB_OUTPUT
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "### Release decision"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- **Mod database changes (has_updates):** $hasUpdates"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- **Force all (workflow input):** $forceAll"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- **Result:** $(if ($willCreateReleases) { 'Create Release Packages **will run**' } else { 'Create Release Packages **skipped** (no release will be published)' })"
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "- **Why:** $reason"

      - name: Commit Database Updates
        if: steps.check_updates.outputs.has_updates == 'true'
        shell: pwsh
        run: |
          Write-Host "💾 Committing database updates..." -ForegroundColor Cyan
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add modlist.csv
          git commit -m "chore: Daily mod update - $(Get-Date -Format 'yyyy-MM-dd')"
          git push
          Write-Host "✅ Database changes committed and pushed" -ForegroundColor Green

  create-releases:
    needs: update-database
    if: |
      needs.update-database.outputs.has_updates == 'true' ||
      github.event.inputs.force_all == 'true'

    runs-on: windows-latest
    timeout-minutes: 120
    env:
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
      MINECRAFT_SERVER_URL: ${{ secrets.MINECRAFT_SERVER_URL }}
      FABRIC_SERVER_URL: ${{ secrets.FABRIC_SERVER_URL }}
    strategy:
      matrix:
        version: ${{ fromJson(needs.update-database.outputs.versions_matrix) }}
      fail-fast: false
      max-parallel: 3

    steps:
      - name: Checkout Repository with Submodules
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: true

      - name: Set up Java 22 for server validation
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Create Release Package for ${{ matrix.version }}
        id: create_release
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "🚀 Creating release package for Minecraft ${{ matrix.version }}" -ForegroundColor Cyan
          .\ModManager.ps1 -CreateRelease -GameVersion "${{ matrix.version }}"

      - name: Check Release Creation Result
        id: check_result
        shell: pwsh
        run: |
          if ("${{ steps.create_release.outcome }}" -eq "success") {
            Write-Host "✅ Version ${{ matrix.version }}: Release created successfully" -ForegroundColor Green
            echo "created=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "❌ Version ${{ matrix.version }}: Server validation failed - no release created" -ForegroundColor Red
            echo "created=false" >> $env:GITHUB_OUTPUT
          }

      - name: Upload Release Artifact
        if: steps.check_result.outputs.created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: modpack-${{ matrix.version }}
          path: releases/${{ matrix.version }}/**
          retention-days: 90
          compression-level: 0

      - name: Log Validation Failure
        if: steps.check_result.outputs.created == 'false'
        shell: pwsh
        run: |
          Write-Host "❌ Release package NOT created for version ${{ matrix.version }}" -ForegroundColor Red
          Write-Host "💡 Server validation failed - check logs for mod compatibility issues" -ForegroundColor Yellow

  create-next-latest-releases:
    needs: update-database
    if: needs.update-database.outputs.has_updates == 'true' || github.event.inputs.force_all == 'true'
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}
      MINECRAFT_SERVER_URL: ${{ secrets.MINECRAFT_SERVER_URL }}
      FABRIC_SERVER_URL: ${{ secrets.FABRIC_SERVER_URL }}

    steps:
      - name: Checkout Repository with Submodules
        uses: actions/checkout@v4
        with:
          ref: main
          submodules: true

      - name: Set up Java 22 for server validation
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'

      - name: Create Release Package for Next version
        if: needs.update-database.outputs.next_game_version != ''
        id: create_next
        shell: pwsh
        continue-on-error: true
        run: |
          $ver = "${{ needs.update-database.outputs.next_game_version }}"
          Write-Host "🚀 Creating release package for Next version (Minecraft $ver)..." -ForegroundColor Cyan
          .\ModManager.ps1 -CreateRelease -GameVersion $ver
          if ($LASTEXITCODE -eq 0) {
            echo "created=true" >> $env:GITHUB_OUTPUT
            echo "version=$ver" >> $env:GITHUB_OUTPUT
          } else {
            echo "created=false" >> $env:GITHUB_OUTPUT
          }

      - name: Upload Next version release artifact
        if: needs.update-database.outputs.next_game_version != '' && steps.create_next.outputs.created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: modpack-next-${{ needs.update-database.outputs.next_game_version }}
          path: releases/${{ needs.update-database.outputs.next_game_version }}/**
          retention-days: 90
          compression-level: 0

      - name: Create Release Package for Latest version
        if: needs.update-database.outputs.latest_game_version != ''
        id: create_latest
        shell: pwsh
        continue-on-error: true
        run: |
          $ver = "${{ needs.update-database.outputs.latest_game_version }}"
          Write-Host "🚀 Creating release package for Latest version (Minecraft $ver)..." -ForegroundColor Cyan
          .\ModManager.ps1 -CreateRelease -GameVersion $ver
          if ($LASTEXITCODE -eq 0) {
            echo "created=true" >> $env:GITHUB_OUTPUT
            echo "version=$ver" >> $env:GITHUB_OUTPUT
          } else {
            echo "created=false" >> $env:GITHUB_OUTPUT
          }

      - name: Upload Latest version release artifact
        if: needs.update-database.outputs.latest_game_version != '' && steps.create_latest.outputs.created == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: modpack-latest-${{ needs.update-database.outputs.latest_game_version }}
          path: releases/${{ needs.update-database.outputs.latest_game_version }}/**
          retention-days: 90
          compression-level: 0

  publish-release:
    needs: [update-database, create-releases, create-next-latest-releases]
    if: needs.create-releases.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release_info.outputs.tag }}
      timestamp: ${{ steps.release_info.outputs.timestamp }}
      prerelease: ${{ steps.release_info.outputs.prerelease }}
      make_latest: ${{ steps.release_info.outputs.make_latest }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package Release Files
        shell: bash
        run: |
          set -e
          shopt -s nullglob
          echo "📦 Creating versioned release packages..."
          artifact_dirs=(artifacts/modpack-*/)
          if [ ${#artifact_dirs[@]} -eq 0 ]; then
            echo "❌ No modpack artifacts found; refusing to publish an empty release"
            exit 1
          fi

          for artifact_dir in "${artifact_dirs[@]}"; do
            [ -d "$artifact_dir" ] || continue
            version=$(basename "$artifact_dir" | sed 's/modpack-//')
            echo "  Processing version: $version"

            readme_src="$artifact_dir/README.md"
            readme_dest="README-${version}.md"
            if [ -f "$readme_src" ]; then
              cp "$readme_src" "$readme_dest"
              echo "    ✓ Extracted README.md → $readme_dest"
            else
              echo "    ⚠️  Warning: README.md not found in artifact for $version"
            fi

            cd "$artifact_dir"
            zip -r "../../modpack-$version.zip" *
            cd ../..
            echo "    ✓ Created modpack-$version.zip"
          done

      - name: Generate Checksums
        shell: bash
        run: |
          set -e
          shopt -s nullglob
          files=(modpack-*.zip)
          if [ ${#files[@]} -eq 0 ]; then
            echo "❌ No packaged ZIPs found; nothing to checksum."
            exit 1
          fi
          echo "📐 Computing SHA256 checksums..."
          sha256sum "${files[@]}" > release-hashes.txt
          echo "✓ Wrote release-hashes.txt"

      - name: Generate Release Tag and Notes
        id: release_info
        shell: bash
        run: |
          set -e
          TIMESTAMP=$(date -u '+%Y.%m.%d-%H%M%S')
          TAG="release-${TIMESTAMP}"
          FORCE_ALL="${{ github.event.inputs.force_all }}"

          if [ "$FORCE_ALL" = "true" ]; then
            PRERELEASE="false"
            MAKE_LATEST="true"
            RELEASE_NAME="Latest Modpack Release ${TIMESTAMP}"
            RELEASE_BANNER="> ✅ **LATEST STABLE RELEASE**: This release was manually forced and marked as the latest GitHub Release."
          else
            PRERELEASE="true"
            MAKE_LATEST="false"
            RELEASE_NAME="Modpack Pre-Release ${TIMESTAMP}"
            RELEASE_BANNER="> ⚠️ **PRE-RELEASE**: This is an automated development build."
          fi

          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "timestamp=${TIMESTAMP}" >> $GITHUB_OUTPUT
          echo "prerelease=${PRERELEASE}" >> $GITHUB_OUTPUT
          echo "make_latest=${MAKE_LATEST}" >> $GITHUB_OUTPUT
          echo "release_name=${RELEASE_NAME}" >> $GITHUB_OUTPUT

          shopt -s nullglob
          INCLUDED_FILES=(modpack-*.zip)

          {
            echo "$RELEASE_BANNER"
            if [ "$FORCE_ALL" != "true" ]; then
              echo "> For stable releases, run this workflow manually with **Force create all versions** checked, or use a tag-based release."
            fi
            echo
            echo "# Minecraft Modpack Release - ${TIMESTAMP}"
            echo
            echo "## 📦 Included Packages"
            if [ ${#INCLUDED_FILES[@]} -eq 0 ]; then
              echo "- (none)"
            else
              for f in "${INCLUDED_FILES[@]}"; do
                echo "- **$f**"
              done
            fi
            echo
            echo "## 📋 Changes"
            echo "- Mod database updated: ${{ needs.update-database.outputs.has_updates }}"
            echo "- Manual force all: $FORCE_ALL"
            echo "- Server validation: Successful for packaged versions"
            echo "- Next/Latest version packages included when validation passed"
            echo
            echo "## 🔑 Checksums"
            if [ -f release-hashes.txt ]; then
              echo '```'
              cat release-hashes.txt
              echo '```'
            else
              echo "(checksums unavailable)"
            fi
            echo
            echo "## 📥 Download Instructions"
            echo
            echo "1. Download \`modpack-[version].zip\` for your Minecraft version"
            echo "2. Extract the ZIP file"
            echo "3. Install mods from the \`mods/\` directory to \`.minecraft/mods/\`"
            echo "4. Optional mods are in \`mods/optional/\`"
            echo "5. Check \`hash.txt\` for file verification"
            echo "6. See \`README.md\` or \`README-[version].md\` for complete installation guide"
            echo
            echo "## ℹ️ Release Information"
            echo
            echo "- **Created**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "- **Workflow**: Daily Mod Update Pipeline"
            echo "- **Validation**: Server startup tested for each packaged version"
            echo "- **GitHub latest release**: $MAKE_LATEST"
            echo
            echo "## 🔗 InertiaAntiCheat Integration"
            echo
            echo "Use included \`hash.txt\` to configure InertiaAntiCheat server validation."
          } > release-notes.md

          echo "Generated release-notes.md:"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: ${{ steps.release_info.outputs.release_name }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ steps.release_info.outputs.prerelease }}
          make_latest: ${{ steps.release_info.outputs.make_latest }}
          files: |
            modpack-*.zip
            release-hashes.txt
            README-*.md

  summary:
    needs: [update-database, create-releases, publish-release]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Generate Pipeline Summary
        shell: bash
        run: |
          echo "## Daily Mod Update and Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mod Updates Detected:** ${{ needs.update-database.outputs.has_updates }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Enabled/Selected Versions:** $(echo '${{ needs.update-database.outputs.versions_matrix }}' | jq -r '. | join(", ")')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.create-releases.result }}" = "success" ]; then
            echo "✅ **Release Creation:** Completed successfully" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.create-releases.result }}" = "skipped" ]; then
            echo "⏭️ **Release Creation:** Skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Release Creation:** Some versions failed server validation" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.publish-release.result }}" = "success" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ **GitHub Release:** Published successfully" >> $GITHUB_STEP_SUMMARY
            echo "🔗 **Release Tag:** \`${{ needs.publish-release.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
            echo "🏷️ **Timestamp:** ${{ needs.publish-release.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
            echo "🚀 **Marked Latest:** ${{ needs.publish-release.outputs.make_latest }}" >> $GITHUB_STEP_SUMMARY
            echo "🧪 **Pre-release:** ${{ needs.publish-release.outputs.prerelease }}" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.publish-release.result }}" = "skipped" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⏭️ **GitHub Release:** Skipped" >> $GITHUB_STEP_SUMMARY
          else
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ **GitHub Release:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
